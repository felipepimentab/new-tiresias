# I2S
CONFIG_I2S=n
CONFIG_NRFX_I2S0=y
CONFIG_I2S_NRFX=n
CONFIG_SERIAL=y
# Bluetooth
CONFIG_BT=y
CONFIG_BT_PERIPHERAL=y
CONFIG_BT_DEVICE_NAME="Tiresias_DK"
CONFIG_BT_GATT_DYNAMIC_DB=y
CONFIG_BT_SMP=y
## Device Information Service
CONFIG_BT_DIS=y
CONFIG_BT_DIS_MANUF="EESC-USP"
CONFIG_BT_DIS_MODEL="Tiresias Hearing Aid"
CONFIG_BT_DIS_FW_REV=y
## Battery Service
CONFIG_BT_BAS=y
# https://docs.nordicsemi.com/bundle/zephyr-apis-latest/page/group_bt_bas.html
# CONFIG_BT_AUDIO=y
# CONFIG_BT_BAP_BROADCAST_SINK=y
# CONFIG_BT_ISO=y
# MCUMGR
CONFIG_MCUMGR=y
CONFIG_MCUMGR_TRANSPORT_BT=y
CONFIG_MCUMGR_GRP_OS=y
CONFIG_MCUMGR_GRP_IMG=y
CONFIG_MCUMGR_GRP_SHELL=y
CONFIG_STATS=y
CONFIG_MCUMGR_GRP_STAT=y
CONFIG_SHELL=y
CONFIG_BT_SHELL=y
CONFIG_SHELL_BACKEND_DUMMY=y
# GPIO
CONFIG_GPIO=y
# Debug
CONFIG_DEBUG_THREAD_INFO=y
CONFIG_DEBUG_OPTIMIZATIONS=y
# Log
CONFIG_LOG=y
CONFIG_LOG_MODE_DEFERRED=n
# Enable RTT
CONFIG_USE_SEGGER_RTT=y
CONFIG_LOG_BACKEND_RTT=y
CONFIG_LOG_BACKEND_SHOW_COLOR=n
CONFIG_LOG_MODE_IMMEDIATE=n
CONFIG_SEGGER_RTT_BUFFER_SIZE_UP=8192
# Enables console over RTT
CONFIG_RTT_CONSOLE=y
# ZBUS
CONFIG_ZBUS=y
CONFIG_ZBUS_LOG_LEVEL_INF=y
CONFIG_ZBUS_RUNTIME_OBSERVERS=y
# Stacks and heaps
CONFIG_MAIN_STACK_SIZE=16384
CONFIG_HEAP_MEM_POOL_SIZE=16384
# I2C
CONFIG_I2C=y
CONFIG_NRFX_TWIM1=y
CONFIG_NRFX_TIMER1=y
# NFC pins disable
# CONFIG_NFCT_PINS_AS_GPIOS=y
# Storage
CONFIG_FLASH=y
CONFIG_FLASH_MAP=y
CONFIG_NVS=y
CONFIG_MPU_ALLOW_FLASH_WRITE=y
# Tiresias
# CONFIG_NO_AUDIO_CODEC=y
CONFIG_AUDIO_CODEC_ADAU1787=y
# FOTA
CONFIG_NCS_SAMPLE_MCUMGR_BT_OTA_DFU=y
CONFIG_PINCTRL=y